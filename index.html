            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: all 0.15s;
            color: var(--color-secondary);
        }

        .option-btn:hover::after {
            opacity: 1;
            right: 15px;
        }

        .option-btn:hover {
            border-color: var(--color-mystical);
            background: linear-gradient(135deg, rgba(106, 5, 114, 0.4) 0%, rgba(193, 84, 193, 0.3) 100%);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3) 0%, rgba(193, 84, 193, 0.4) 100%);
            border-color: var(--color-secondary);
            animation: selectedPulse 0.4s ease-out;
        }

        @keyframes selectedPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }
            100% { transform: scale(1); }
        }

        #progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(13, 2, 33, 0.8);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg,
                var(--color-secondary) 0%,
                var(--color-mystical) 50%,
                var(--color-secondary) 100%);
            width: 0%;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px var(--color-secondary);
            animation: progressGlow 1.5s ease-in-out infinite;
            will-change: width;
        }

        /* Liquid wave effect on quiz progress bar */
        #progress-bar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center,
                rgba(255, 255, 255, 0.25) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                transparent 70%);
            animation: liquidWave 2.5s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes liquidWave {
            0%, 100% {
                transform: translate(-25%, -75%) rotate(0deg);
            }
            50% {
                transform: translate(-30%, -70%) rotate(180deg);
            }
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 10px var(--color-secondary); }
            50% { box-shadow: 0 0 25px var(--color-secondary), 0 0 40px var(--color-mystical); }
        }

        #progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                transparent);
            transform: skewX(-45deg) translateX(-100%);
            animation: shimmer 1.5s ease-out infinite;
            z-index: 2;
        }

        @keyframes shimmer {
            0% { transform: skewX(-45deg) translateX(-100%); }
            100% { transform: skewX(-45deg) translateX(300%); }
        }

        #progress-text {
            color: var(--color-text-gold);

            will-change: transform, opacity;
            transition: opacity 0.4s ease-in-out;
            /* Prevent long press save/context menu */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            pointer-events: none;
        }

        @keyframes cardReveal {
            0% {
                opacity: 0;
                transform: rotateY(90deg) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: rotateY(0deg) scale(1);

        }
